services:
  - type: web
    name: daniela-bino-backend
    runtime: python
    plan: standard
    rootDir: .
    buildCommand: pip install -r daniela_bino_requirements.txt
    startCommand: uvicorn daniela_bino_backend:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: BINO_CORS_ORIGINS
        sync: false
      - key: BINO_OBSERVER_MODEL
        value: Qwen/Qwen2.5-0.5B-Instruct
      - key: BINO_PERFORMER_MODEL
        value: Qwen/Qwen2.5-0.5B
      - key: BINO_THRESHOLD
        value: "0.9"
      - key: BINO_BATCH_SIZE
        value: "2"
      - key: BINO_MAX_LENGTH
        value: "256"

  - type: static
    name: daniela-ai-detection
    rootDir: .
    buildCommand: ""
    staticPublishPath: .
    routes:
      - type: rewrite
        source: /
        destination: /index.html
